storage:
  hl-nas01:
    name: TrueNAS
    vmid: 200
    host: nova (hl-pve02)
    ip: 10.1.1.11
    role: Primary NAS - shared storage, media, backups, AI datasets
    protocols: NFS, SMB, ZFS
    pools:
      Tank:
        drives: 9.1TB HGST CMR (sda on Nova)
        usage: 16% (1.54TB used)
        type: single vdev (no redundancy — mirror expansion planned)
        notes: Primary data pool. Rebuilt 2026-04-02 after SMR-related crash loop.
      Backup:
        drives: 3.62TB WD Purple (sdb on Nova)
        type: single vdev
        notes: Backup pool. Empty as of rebuild.
      Archive:
        drives: 7.27TB SMR (sdc on Orin — ST8000DM004)
        type: single vdev
        notes: "Cold archive only. SMR drive — sustained writes cause crashes. Replace with CMR when budget allows."
    nfs_exports:
      - /mnt/Tank/Media  → /mnt/media on Proxmox nodes
      - /mnt/Tank        → /mnt/Tank on Proxmox nodes
