# Services Catalog — Aegis Infrastructure
# Last updated: 2026-04-03

services:

  openclaw:
    description: AI agent orchestration platform
    nodes: [jasper, nova, mira, orin]
    gateway_host: jasper
    ports:
      gateway: 18789
      node: 18793
    notes: Jasper is the primary orchestrator. Agent VMs on each Proxmox node.

  ollama:
    description: Local LLM inference (GPU-backed)
    host: jasper
    port: 11434
    gpu: RTX 4090 (24GB VRAM)
    models:
      active:
        - qwen2.5:32b-instruct
        - qwen2.5:14b-instruct
        - deepseek-coder-v2:latest
        - nomic-embed-text:latest
    notes: ~60-70 tok/s throughput on 4090.

  proxmox:
    description: Hypervisor cluster (3-node)
    version: Proxmox VE 8.x
    cluster: CL-1
    nodes:
      nova:  { ip: 10.1.1.2, webui: "https://10.1.1.2:8006" }
      mira:  { ip: 10.1.1.4, webui: "https://10.1.1.4:8006" }
      orin:  { ip: 10.1.1.5, webui: "https://10.1.1.5:8006" }

  truenas:
    description: Network attached storage
    host: nova (VM 200)
    ip: 10.1.1.11
    protocols: [NFS, SMB, ZFS]
    pools:
      - Tank: 9.1TB HGST CMR — primary data (Nova/sda)
      - Backup: 3.62TB WD Purple — backup pool (Nova/sdb)
      - Archive: 7.27TB SMR — cold archive only (Orin/sdc)
    nfs_exports:
      - /mnt/Tank/Media → /mnt/media on Proxmox nodes (soft,timeo=30,retrans=3)
      - /mnt/Tank → /mnt/Tank on Proxmox nodes

  npm:
    description: Nginx Proxy Manager Plus — reverse proxy
    host: dedicated CT
    ip: 10.1.1.60
    port_admin: 81
    notes: "All .lab services accessible without port numbers via NPMplus. 16 proxy hosts configured."

  monitoring:
    description: Prometheus + Grafana observability stack
    host: mira (CT 303)
    ip: 10.1.1.25
    ports:
      prometheus: 9090
      grafana: 3000
    dashboards:
      - Node Exporter Full (1860)
      - Proxmox via Prometheus (10347)
    notes: 13+ scrape targets across all nodes.

  wazuh:
    description: SIEM / security monitoring
    host: dedicated CT
    ip: 10.1.1.26
    ports:
      manager: 1514
      enrollment: 1515
      api: 55000
      indexer: 9200

  immich:
    description: Self-hosted photo management
    host: orin (CT 502)
    ip: 10.1.1.30
    port: 2283
    url: "http://10.1.1.30:2283"
    containers: [immich_server, immich_machine_learning, immich_postgres, valkey]

  plex:
    description: Media server
    host: nova (CT 101)
    ip: 10.1.1.31
    port: 32400
    url: "http://10.1.1.31:32400"
    media_mount: /mnt/nas/media (read-only NFS)

  unifi:
    description: UniFi wireless controller
    host: mira (CT 300)
    ip_vlan20: 10.1.20.100
    port_inform: 8080
    port_webui: 8443
    devices:
      - name: UniFi U7-Pro-XG-B
        mac: 84:78:48:cc:7b:6c
        ip: 10.1.1.19
        ssid: Estes Home
        bands: [2.4GHz, 5GHz, 6GHz]
    notes: "Controller on VLAN 20 only. inform_url: http://10.1.20.100:8080/inform (IP-based, no DNS dependency)."

  vaultwarden:
    description: Self-hosted Bitwarden-compatible password manager
    host: nova (CT 110)
    ip: 10.1.1.253
    port: 8222
    url: "http://10.1.1.253:8222"
    backend: SQLite
    deployed: 2026-03-25

  pbs:
    description: Proxmox Backup Server
    host: orin (CT 508)
    port_webui: 8007
    notes: Backup target for Proxmox VMs and CTs.

  paperless:
    description: Document management with AI tagging
    host: dedicated CT (CT 102)
    ip: 10.1.1.198
    port: 8000
    url: "http://10.1.1.198:8000"
    smb_drop: "\\TRUENAS\Paperless-Consume"
    deployed: 2026-04-01

  pentagi:
    description: Autonomous AI pentesting platform
    host: orin (CT 507)
    ip_vlan20: 10.1.20.57
    port_webui: 8443
    url: "https://pentagi.lab:8443"
    notes: "Claude Sonnet primary + DeepSeek + local Ollama (qwen2.5:14b). Deployed for Pentest+ prep and WGU portfolio."

  hindsight:
    description: Vector memory store for cross-session semantic search
    host: mira (Docker)
    ip: 10.1.20.22
    ports:
      api: 8888
      webui: 9999
    bank: jasper
    backend: PostgreSQL + pgvector (embedded)
    llm: Ollama qwen2.5:14b on Jasper

  ansible:
    description: Configuration management
    controller: nova (openclaw-nova VM)
    managed: [mira, orin]
    inventory: nodes/nova/homelab-controller/inventory/inventory.yml
