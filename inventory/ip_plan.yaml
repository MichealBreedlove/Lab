# IP Address Plan — Aegis Infrastructure
# Last updated: 2026-04-03
# VLAN segmentation active across all 10 VLANs (Kea DHCP, OPNsense 26.1.2_5)

# ============================================================
# LAN (10.1.1.0/24) — Infrastructure & Static Devices
# ============================================================
lan:
  subnet: 10.1.1.0/24
  gateway: 10.1.1.1      # hl-fw01 (OPNsense)
  dhcp_pool: 10.1.1.100-10.1.1.254

  static:
    10.1.1.1:   hl-fw01 (OPNsense — firewall/router/DNS/DHCP)
    10.1.1.2:   nova (PROXMOX-1)
    10.1.1.3:   nova-sfp (SFP+ 10GbE → Nexus)
    10.1.1.4:   mira (PROXMOX-2)
    10.1.1.5:   orin (PROXMOX-3)
    10.1.1.11:  truenas (VM 200 on Nova)
    10.1.1.19:  unifi-ap (UniFi U7-Pro-XG-B — DHCP reservation)
    10.1.1.25:  monitoring (CT 303 — Prometheus + Grafana)
    10.1.1.26:  wazuh (SIEM)
    10.1.1.30:  immich (CT 502 on Orin)
    10.1.1.31:  plex (CT 101 on Nova)
    10.1.1.60:  npmplus (Nginx Proxy Manager Plus — reverse proxy)
    10.1.1.150: jasper (GamingPC — ethernet)
    10.1.1.151: jasper-wifi (GamingPC — WiFi)
    10.1.1.198: paperless (CT 102 — document management)
    10.1.1.200: nexus (Cisco Nexus 3064)
    10.1.1.210: jasper-40g-p1 (ConnectX-3 Pro port 1)
    10.1.1.211: jasper-40g-p2 (ConnectX-3 Pro port 2)
    10.1.1.253: vaultwarden (CT 110 on Nova)

# ============================================================
# VLAN 20 — MGMT (10.1.20.0/24)
# Agent VMs, controller interfaces, management plane
# ============================================================
vlan_20_mgmt:
  subnet: 10.1.20.0/24
  gateway: 10.1.20.1

  static:
    10.1.20.21:  nova-agent (openclaw-nova VM 201)
    10.1.20.22:  mira-agent (openclaw-mira VM 400)
    10.1.20.23:  orin-agent (openclaw-orin VM 600)
    10.1.20.57:  pentagi (CT 507 on Orin — AI pentesting)
    10.1.20.100: unifi-ctrl (CT 300 on Mira — UniFi controller)

# ============================================================
# VLAN 30 — SERVER (10.1.30.0/24)
# ============================================================
vlan_30_server:
  subnet: 10.1.30.0/24
  gateway: 10.1.30.1
  purpose: VMs, containers, internal applications

# ============================================================
# VLAN 40 — STORAGE (10.1.40.0/24)
# NFS/SMB traffic only — isolated from clients
# ============================================================
vlan_40_storage:
  subnet: 10.1.40.0/24
  gateway: 10.1.40.1

  static:
    10.1.40.5:  orin-storage (ConnectX-3 Pro VLAN 40 interface)
    10.1.40.11: truenas-storage (TrueNAS storage interface)

# ============================================================
# VLAN 50 — AI-COMPUTE (10.1.50.0/24)
# ============================================================
vlan_50_ai_compute:
  subnet: 10.1.50.0/24
  gateway: 10.1.50.1

  static:
    10.1.50.5:   orin-ai (ConnectX-3 Pro VLAN 50 interface)
    10.1.50.150: jasper (Ollama endpoint / RTX 4090)

# ============================================================
# VLAN 60 — LAB (10.1.60.0/24)
# NetForge CCNA training — isolated
# ============================================================
vlan_60_lab:
  subnet: 10.1.60.0/24
  gateway: 10.1.60.1

# ============================================================
# VLAN 70 — SECURITY (10.1.70.0/24)
# Sentinel security lab, SIEM, scanners
# ============================================================
vlan_70_security:
  subnet: 10.1.70.0/24
  gateway: 10.1.70.1

  static:
    10.1.70.25: monitoring-security (Prometheus scrape interface)

# ============================================================
# VLAN 80 — CLIENT (10.1.80.0/24)
# Downloads VLAN — qBittorrent, Radarr, Sonarr, Prowlarr
# ============================================================
vlan_80_client:
  subnet: 10.1.80.0/24
  gateway: 10.1.80.1
  notes: Proxied via Nginx on Orin (10.1.1.5) to avoid direct VLAN 80 access from LAN

# ============================================================
# VLAN 90 — IOT (10.1.90.0/24)
# ============================================================
vlan_90_iot:
  subnet: 10.1.90.0/24
  gateway: 10.1.90.1

# ============================================================
# VLAN 100 — GUEST (10.1.100.0/24)
# ============================================================
vlan_100_guest:
  subnet: 10.1.100.0/24
  gateway: 10.1.100.1
  purpose: Internet-only, no LAN access

# ============================================================
# OOB (future)
# ============================================================
oob_reserved:
  subnet: 10.1.200.0/24
  purpose: True OOB management network (future)
  devices:
    10.1.1.220: orin-idrac (Dell iDRAC — PROXMOX-3)
