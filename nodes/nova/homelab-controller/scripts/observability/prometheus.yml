global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "nova"
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          node: "nova"
          role: "controller"

  - job_name: "mira"
    static_configs:
      - targets: ["10.1.1.22:9100"]
        labels:
          node: "mira"
          role: "worker"

  - job_name: "orin"
    static_configs:
      - targets: ["10.1.1.23:9100"]
        labels:
          node: "orin"
          role: "worker"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
