logging {
  debug: off
  to_syslog: yes
}

nodelist {
  node {
    name: PROXMOX
    nodeid: 1
    quorum_votes: 1
    ring0_addr: 10.1.1.2
  }
  node {
    name: PROXMOX-2
    nodeid: 2
    quorum_votes: 1
    ring0_addr: 10.1.1.4
  }
  node {
    name: PROXMOX-3
    nodeid: 3
    quorum_votes: 1
    ring0_addr: 10.1.1.5
  }
}

quorum {
  provider: corosync_votequorum
}

totem {
  cluster_name: CL-1
  config_version: 3
  interface {
    linknumber: 0
  }
  ip_version: ipv4-6
  link_mode: passive
  secauth: on
  version: 2
}

