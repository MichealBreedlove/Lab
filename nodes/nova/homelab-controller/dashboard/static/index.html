<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        h2 { color: #8b949e; margin: 20px 0 10px; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
        }
        .card h3 { color: #c9d1d9; font-size: 0.95em; margin-bottom: 8px; }
        .card .value { font-size: 2em; font-weight: bold; }

        .status-ok { color: #3fb950; }
        .status-warn { color: #d29922; }
        .status-error { color: #f85149; }

        .slo-bar {
            height: 8px;
            background: #21262d;
            border-radius: 4px;
            margin: 8px 0;
            overflow: hidden;
        }
        .slo-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .slo-bar-fill.ok { background: #3fb950; }
        .slo-bar-fill.warn { background: #d29922; }
        .slo-bar-fill.error { background: #f85149; }

        .slo-detail { font-size: 0.85em; color: #8b949e; margin-top: 4px; }
        .slo-objective { float: right; color: #58a6ff; }

        .alert-list { list-style: none; }
        .alert-list li {
            padding: 8px 12px;
            margin: 4px 0;
            background: #1c1208;
            border-left: 3px solid #d29922;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .alert-list li.critical {
            background: #1c0808;
            border-left-color: #f85149;
        }

        .summary-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .summary-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 20px;
            text-align: center;
            flex: 1;
        }
        .summary-item .label { font-size: 0.8em; color: #8b949e; }
        .summary-item .count { font-size: 1.8em; font-weight: bold; margin-top: 4px; }

        .burn-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .burn-table th { text-align: left; color: #8b949e; padding: 4px 8px; border-bottom: 1px solid #30363d; }
        .burn-table td { padding: 4px 8px; }
        .burn-high { color: #f85149; font-weight: bold; }
        .burn-med { color: #d29922; }
        .burn-ok { color: #3fb950; }

        .timestamp { color: #484f58; font-size: 0.8em; margin-top: 16px; }
        .no-data { color: #484f58; font-style: italic; padding: 40px; text-align: center; }

        #refresh-btn {
            background: #21262d;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
        }
        #refresh-btn:hover { background: #30363d; }
    </style>
</head>
<body>
    <h1>🏠 Homelab Dashboard <button id="refresh-btn" onclick="loadData()">↻ Refresh</button></h1>

    <div id="incident-section">
        <h2>🚨 Incidents</h2>
        <div id="incident-content" class="grid"></div>
    </div>

    <div id="slo-section">
        <h2>📊 Service Level Objectives</h2>
        <div id="slo-summary" class="summary-row"></div>
        <div id="slo-alerts"></div>
        <div id="slo-grid" class="grid"></div>
        <div id="burn-section" style="margin-top: 20px;">
            <h2>🔥 Burn Rates</h2>
            <div id="burn-content"></div>
        </div>
        <p id="slo-timestamp" class="timestamp"></p>
    </div>

    <div id="dr-section">
        <h2>🛡️ Disaster Recovery</h2>
        <div id="dr-summary" class="summary-row"></div>
        <div id="dr-grid" class="grid"></div>
        <p id="dr-timestamp" class="timestamp"></p>
    </div>

    <script>
    async function loadDR() {
        try {
            const resp = await fetch('data/dr_status.json');
            if (!resp.ok) throw new Error('No data');
            const dr = await resp.json();
            renderDR(dr);
        } catch (e) {
            document.getElementById('dr-summary').innerHTML = '';
            document.getElementById('dr-grid').innerHTML =
                '<div class="card"><p style="color:#484f58">No DR data available. Run <code>oc dr preflight</code> on Nova.</p></div>';
        }
    }

    function renderDR(dr) {
        const score = dr.readiness_score || 0;
        const status = dr.status || 'RED';
        const statusClass = status === 'GREEN' ? 'ok' : status === 'YELLOW' ? 'warn' : 'error';
        const statusIcon = status === 'GREEN' ? '🟢' : status === 'YELLOW' ? '🟡' : '🔴';

        // Summary row
        document.getElementById('dr-summary').innerHTML = `
            <div class="summary-item">
                <div class="label">Readiness</div>
                <div class="count status-${statusClass}">${statusIcon} ${status}</div>
            </div>
            <div class="summary-item">
                <div class="label">Score</div>
                <div class="count status-${statusClass}">${score}</div>
            </div>
            <div class="summary-item">
                <div class="label">Last Drill MTTR</div>
                <div class="count">${dr.last_drill_mttr_sec != null ? dr.last_drill_mttr_sec + 's' : '—'}</div>
            </div>
            <div class="summary-item">
                <div class="label">Break-Glass</div>
                <div class="count" style="font-size:1em">${dr.break_glass_state || 'none'}</div>
            </div>
        `;

        // DR detail cards
        let html = '';

        // Preflight card
        const pf = dr.preflight || {};
        const pfIcon = pf.pass ? '✅' : '❌';
        html += `<div class="card">
            <h3>${pfIcon} Preflight</h3>
            <div class="slo-detail">Node: ${pf.node || '?'} (${pf.platform || '?'})</div>
            <div class="slo-detail">Git: ${pf.git_ok ? '✅' : '❌'} | Binaries: ${pf.binaries_ok ? '✅' : '❌'} | Snapshot: ${pf.snapshot_fresh ? '✅ fresh' : '⚠️ stale'}</div>
            <div class="slo-detail">Last: ${(pf.timestamp || '').substring(0, 19)}</div>
        </div>`;

        // Last drill card
        const drill = dr.last_drill || {};
        if (drill.timestamp) {
            const drillIcon = drill.pass ? '✅' : '❌';
            html += `<div class="card">
                <h3>${drillIcon} Last Drill</h3>
                <div class="value">${drill.mttr_sec != null ? drill.mttr_sec + 's' : '—'}</div>
                <div class="slo-detail">MTTR</div>
                <div class="slo-detail">Date: ${(drill.timestamp || '').substring(0, 10)}</div>
                <div class="slo-detail">Stages: ${drill.stages_pass || '?'}/${drill.stages_total || '?'} passing</div>
            </div>`;
        }

        // Node status cards
        const nodes = dr.nodes || {};
        for (const [name, nd] of Object.entries(nodes)) {
            const ndIcon = nd.validate_pass ? '🟢' : '🔴';
            html += `<div class="card">
                <h3>${ndIcon} ${name}</h3>
                <div class="slo-detail">Platform: ${nd.platform || '?'}</div>
                <div class="slo-detail">Validate: ${nd.validate_pass ? 'PASS' : 'FAIL'} (${nd.checks_passing || '?'}/${nd.checks_total || '?'})</div>
                <div class="slo-detail">Inventory: ${(nd.inventory_ts || 'none').substring(0, 19)}</div>
                <div class="slo-detail">Components: ${nd.components || '?'}</div>
            </div>`;
        }

        document.getElementById('dr-grid').innerHTML = html;
        document.getElementById('dr-timestamp').textContent = `DR data: ${dr.timestamp || 'unknown'}`;
    }

    async function loadIncidents() {
        try {
            const resp = await fetch('data/latest_incident.json');
            if (!resp.ok) throw new Error('No data');
            const inc = await resp.json();
            renderIncident(inc);
        } catch (e) {
            document.getElementById('incident-content').innerHTML =
                '<div class="card"><p style="color:#484f58">No active incidents. ✅</p></div>';
        }
    }

    function renderIncident(inc) {
        const statusIcon = {open: '🔴', resolved: '✅', mitigated: '🟡'}[inc.status] || '❓';
        const timeline = (inc.timeline || []).slice(-5);

        let html = `<div class="card" style="grid-column: 1 / -1;">
            <h3>${statusIcon} ${inc.id} — ${inc.title}</h3>
            <div style="display:flex;gap:20px;margin:8px 0;font-size:0.9em;">
                <span><strong>Severity:</strong> ${inc.severity}</span>
                <span><strong>Status:</strong> ${inc.status}</span>
                <span><strong>Trigger:</strong> ${inc.trigger}</span>
                <span><strong>Opened:</strong> ${(inc.opened_at||'').substring(0,19)}</span>
            </div>`;

        if (timeline.length > 0) {
            html += '<div style="margin-top:10px;"><strong>Recent Timeline:</strong><ul style="list-style:none;padding:0;margin:4px 0;">';
            for (const e of timeline) {
                const ts = (e.timestamp||'').substring(11,19);
                html += `<li style="font-size:0.85em;color:#8b949e;padding:2px 0;">
                    <code>${ts}</code> ${e.event}: ${e.detail} <em>${e.actor}</em></li>`;
            }
            html += '</ul></div>';
        }

        if (inc.evidence_paths && inc.evidence_paths.length > 0) {
            html += '<div style="margin-top:8px;font-size:0.8em;color:#484f58;">' +
                '<strong>Evidence:</strong> ' + inc.evidence_paths.map(p => `<code>${p}</code>`).join(', ') +
                '</div>';
        }

        html += '</div>';
        document.getElementById('incident-content').innerHTML = html;
    }

    async function loadData() {
        try {
            const resp = await fetch('data/slo_current.json');
            if (!resp.ok) throw new Error('No data');
            const data = await resp.json();
            renderSLOs(data);
        } catch (e) {
            document.getElementById('slo-grid').innerHTML =
                '<div class="no-data">No SLO data available. Run <code>oc slo eval</code> on Nova.</div>';
        }
    }

    function renderSLOs(data) {
        const s = data.summary || {};

        // Summary row
        document.getElementById('slo-summary').innerHTML = `
            <div class="summary-item">
                <div class="label">Total SLOs</div>
                <div class="count">${s.total_slos || 0}</div>
            </div>
            <div class="summary-item">
                <div class="label">Meeting Objective</div>
                <div class="count status-ok">${s.slos_meeting_objective || 0}</div>
            </div>
            <div class="summary-item">
                <div class="label">At Risk</div>
                <div class="count status-warn">${s.slos_at_risk || 0}</div>
            </div>
            <div class="summary-item">
                <div class="label">Exhausted</div>
                <div class="count status-error">${s.slos_exhausted || 0}</div>
            </div>
            <div class="summary-item">
                <div class="label">Alerts</div>
                <div class="count ${s.active_alerts > 0 ? 'status-warn' : 'status-ok'}">${s.active_alerts || 0}</div>
            </div>
        `;

        // Alerts
        const alerts = data.alerts || [];
        if (alerts.length > 0) {
            document.getElementById('slo-alerts').innerHTML = '<ul class="alert-list">' +
                alerts.map(a => `<li class="${a.severity === 'fast' ? 'critical' : ''}">${a.message}</li>`).join('') +
                '</ul>';
        } else {
            document.getElementById('slo-alerts').innerHTML = '';
        }

        // SLO cards
        const slos = data.slos || {};
        let html = '';
        for (const [id, slo] of Object.entries(slos)) {
            const b = slo.budget || {};
            const remaining = b.remaining_budget_pct || 0;
            const statusClass = b.budget_exhausted ? 'error' : b.budget_at_risk ? 'warn' : 'ok';
            const statusIcon = b.budget_exhausted ? '🔴' : b.budget_at_risk ? '🟡' : '🟢';
            const sli = b.sli_current != null ? (b.sli_current * 100).toFixed(2) + '%' : 'N/A';

            html += `
                <div class="card">
                    <h3>${statusIcon} ${slo.name || id} <span class="slo-objective">Target: ${((slo.objective || 0) * 100).toFixed(1)}%</span></h3>
                    <div class="value status-${statusClass}">${remaining.toFixed(1)}%</div>
                    <div class="slo-detail">budget remaining</div>
                    <div class="slo-bar"><div class="slo-bar-fill ${statusClass}" style="width: ${Math.min(remaining, 100)}%"></div></div>
                    <div class="slo-detail">SLI: ${sli} | Bad: ${b.bad_events || 0}/${(b.allowed_bad_events || 0).toFixed(0)} allowed</div>
                </div>
            `;
        }
        document.getElementById('slo-grid').innerHTML = html;

        // Burn rates table
        let burnHtml = '<table class="burn-table"><tr><th>SLO</th><th>1h</th><th>6h</th><th>24h</th><th>7d</th><th>28d</th></tr>';
        for (const [id, slo] of Object.entries(slos)) {
            const br = slo.burn_rates || {};
            burnHtml += `<tr><td>${slo.name || id}</td>`;
            for (const w of ['rolling_1h', 'rolling_6h', 'rolling_24h', 'rolling_7d', 'rolling_28d']) {
                const val = br[w]?.burn_rate;
                if (val == null) {
                    burnHtml += '<td>—</td>';
                } else {
                    const cls = val >= 6 ? 'burn-high' : val >= 2 ? 'burn-med' : 'burn-ok';
                    burnHtml += `<td class="${cls}">${val.toFixed(1)}x</td>`;
                }
            }
            burnHtml += '</tr>';
        }
        burnHtml += '</table>';
        document.getElementById('burn-content').innerHTML = burnHtml;

        // Timestamp
        document.getElementById('slo-timestamp').textContent = `Last updated: ${data.timestamp || 'unknown'}`;
    }

    // Auto-load on page open
    loadData();
    loadIncidents();
    loadDR();
    // Auto-refresh every 5 minutes
    setInterval(loadData, 300000);
    setInterval(loadIncidents, 300000);
    setInterval(loadDR, 300000);
    </script>
</body>
</html>
