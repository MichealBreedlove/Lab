---
# P43 — OPNsense Inventory: backup config and collect system info
- name: "OPNsense Inventory"
  hosts: opnsense
  gather_facts: false
  become: false
  vars:
    output_dir: "{{ artifacts_root }}/opnsense/{{ timestamp }}"
    local_output: "{{ playbook_dir }}/../artifacts/controlplane/opnsense/{{ lookup('pipe', 'date +%Y-%m-%d') }}"

  tasks:
    - name: Create local output directory
      file:
        path: "{{ local_output }}"
        state: directory
        mode: "0750"
      delegate_to: localhost

    - name: Collect system commands
      raw: "{{ item.cmd }}"
      register: opn_cmds
      loop: "{{ opnsense_commands }}"
      ignore_errors: true
      changed_when: false

    - name: Save command outputs
      copy:
        content: "{{ item.stdout | default('command failed') }}"
        dest: "{{ local_output }}/{{ item.item.name }}.txt"
      delegate_to: localhost
      loop: "{{ opn_cmds.results }}"
      when: item is not skipped

    - name: Backup config.xml via SSH
      raw: "cat {{ opnsense_config_path }}"
      register: opn_config
      ignore_errors: true
      changed_when: false
      when: opnsense_backup_method == "ssh"

    - name: Save config.xml (will be sanitized later)
      copy:
        content: "{{ opn_config.stdout | default('backup failed - check SSH access') }}"
        dest: "{{ local_output }}/config.xml.raw"
      delegate_to: localhost
      when: opn_config is defined and opn_config.stdout is defined

    - name: Note if API not configured
      copy:
        content: |
          OPNsense API not configured.
          To enable: System > Access > Users > [user] > API Keys
          Store key/secret in ~/.config/homelab/secrets.env as:
          OPNSENSE_API_KEY=...
          OPNSENSE_API_SECRET=...
        dest: "{{ local_output }}/API_NOT_CONFIGURED.md"
      delegate_to: localhost
      when: not (opnsense_api_configured | default(false))

    - name: Write inventory summary
      copy:
        content: |
          # OPNsense Inventory — {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
          Host: {{ ansible_host }}
          Method: {{ opnsense_backup_method }}
          API configured: {{ opnsense_api_configured | default(false) }}
          Files collected: {{ opn_cmds.results | selectattr('rc', 'defined') | selectattr('rc', 'eq', 0) | list | length }}/{{ opnsense_commands | length }} commands
        dest: "{{ local_output }}/SUMMARY.md"
      delegate_to: localhost
